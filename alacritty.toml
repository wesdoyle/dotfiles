
[env]
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
opacity = 0.9
padding = { x = 8, y = 8 }
dynamic_padding = true
option_as_alt = "Both"          # critical for macOS — lets Alt keybinds work in nvim

[font]
size = 12.0

[font.normal]
family = "NotoMono Nerd Font"
style = "Regular"

[font.bold]
family = "NotoMono Nerd Font"
style = "Bold"

[font.italic]
family = "NotoMono Nerd Font"
style = "Italic"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[scrolling]
history = 10000

[general]
live_config_reload = true
